name: Fuel Price Scraper

# Scrapes Pakistan petrol/diesel prices and commits the result to
# data/fuel-prices.json so the FleetLine app can read it via the GitHub
# raw URL. See scripts/scrape-fuel-prices.mjs for the scraping logic.

on:
  schedule:
    # 1am Pakistan Time (UTC+5) and 9am Pakistan Time
    # OGRA usually announces price revisions around midnight, so the early
    # morning runs catch the new prices before riders go to market.
    - cron: '0 20 * * *'  # 01:00 PKT
    - cron: '0 4 * * *'   # 09:00 PKT
  workflow_dispatch: {}    # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run scraper
        run: node scripts/scrape-fuel-prices.mjs

      - name: Commit price update if changed
        run: |
          if [[ -n "$(git status --porcelain data/fuel-prices.json)" ]]; then
            git config user.name "fuel-price-bot"
            git config user.email "fuel-price-bot@users.noreply.github.com"
            git add data/fuel-prices.json
            git commit -m "chore(fuel): refresh prices from feed"
            git push
          else
            echo "No fuel price change detected."
          fi
