<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#ff6b1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FleetLine" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta
    name="description"
    content="FleetLine tracks rider odometer submissions, fuel costs, and fleet operations on Supabase."
  />

  <title>FleetLine - Fleet Management</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />

  <style>
    html, body {
      margin: 0;
      background: #000;
      color: #fff;
      overscroll-behavior: none;
    }

    body {
      font-family: system-ui, sans-serif;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 9999;
    }

    #app-loading .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 107, 26, 0.2);
      border-top-color: #ff6b1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="app-loading"><div class="spinner"></div></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const isLocalDev = ['localhost', '127.0.0.1'].includes(window.location.hostname);

        if (isLocalDev) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            registrations.forEach((registration) => registration.unregister());
          });
          caches.keys().then((names) => {
            names.forEach((name) => caches.delete(name));
          });
          return;
        }

        navigator.serviceWorker.register('/service-worker.js').catch((err) => {
          console.warn('[FleetLine] SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
